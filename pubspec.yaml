name: nine_dart_score
description: "Application de fléchettes permettant aux joueurs de compter facilement leurs scores et de suivre leur progression."
publish_to: 'none'
version: 1.0.2+6

environment:
  sdk: ^3.11.5
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.9
  drift: ^2.32.1
  drift_flutter: ^0.3.0
  flutter_svg: ^2.2.4
  get_it: ^9.2.1
  flutter_bloc: ^9.1.1
  dart_mappable: ^4.8.0
  lottie: ^3.3.3
  flutter_launcher_icons: ^0.14.4
  google_fonts: ^8.0.2
  injectable: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.32.1
  injectable_generator: ^3.0.2
  build_runner: ^2.10.4
  dart_mappable_builder: ^4.8.0
flutter:
  uses-material-design: true
  assets:
    - assets/


flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/dart_nine_score_logo.png"
  remove_alpha_ios: true
